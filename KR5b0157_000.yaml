front:
  text: 洪恩靈濟真君祈謝設醮科一七
  hash: sha256:5b33f72f35dc494b35941db291a00507cebbd69f5945f57115cb3d49111b4533
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0157_HFL_000-001a, image: hfl/0264/0264-126.png}
body:
  text: 法事各禮師存念如法請宣神呪五星列照煥明五方水星却災木德致昌熒惑消禍太白辟兵鎮星四據家國利亨名刋玉簡字録帝房乘飈散景飛騰太空出入冥無遊宴十方五雲浮蓋招神攝風役使萬靈上衛仙翁鳴法鼓二十四通太上玄元五靈老君召出臣等身中三五功曹左右香官使者侍香金童傳言散花玉女直日香官功曹使者三氣正神速上關啓查邊魏趙刀五大元帥嶽許二元帥天丁力士左右神官以今嚴陳醮禮謹欽奉聖旨其諸意旨巳録上聞願得正真生氣下降流入臣等身中令今所啓之言速達九天金闕明道達德大仙顯靈溥濟清微洞玄沖虛妙感慈惠護國庇民洪恩真君九天玉闕宣化扶教上仙昭靈博濟髙明弘靜沖湛妙應仁惠輔國佑民洪恩真君道前請稱法位具位臣某與臨壇官衆等謹同誠上啓九天金闕明道達德大仙顯靈溥濟清微洞玄沖虛妙感慈惠護國庇民洪恩真君九天玉闕宣化扶教上仙昭靈博濟髙明弘靜沖湛妙應仁惠輔國佑民洪恩真君聖父齊王忠武翊亮真君聖母仁壽淑善仙妃聖妃涇國夫人順助仁惠貞應仙妃衛國夫人善助慈懿恭靜仙妃聖兄唐王洪王鄂王廣陵王聖舅護國公奉國公聖壻武安侯寧國侯聖子保大侯彰信侯保信侯保寧侯武寧公聖姪昭德侯安定侯太寧侯聖孫武昌侯南昌侯聖子聖孫聖姪列位公侯唐王后明肅仙妃洪王后仁慈仙妃鄂王后順懿仙妃廣陵王后善慶仙妃聖女沖懿仙姬明懿仙姬聖婦善懿夫人仁柔夫人惠順夫人昭懿夫人順恭夫人明哲夫人恭懿夫人靖懿夫人昭穆夫人慈孝夫人聖婦列位夫人上清大洞籙天機院雷霆省天文院地府諸司承行官將驅邪捉祟傳符勑法消災度厄逐凶辟怪監壇護法觀察巡捕將軍太歲尊神十二月將本命元辰星官風雷雨部仙衆左右丞相太宰少宰六部尚侍內府公卿左右注生注壽上宰左右司祿司福上宰左右侍從通事舍人百官庶司所屬曹僚列位公卿左右福祿司所屬二十四司曹官典左右引進仙官內侍順成夫人昭華夫人容華夫人修容夫人修儀夫人昭儀夫人內典婦功夫人絲枲夫人管庫夫人帳籍夫人度支夫人女府女史列位才人女祝女御列位貴人內殿內侍內典列位聖眷夫人燕喜堂內注生司天一注生神后太一監生神后司祿司命上相夫人守胎衛房夫人保胎護命夫人左右慈訓夫人保傅夫人左右掌籍夫人掌印夫人諸宫乳哺夫人抱送夫人撫育夫人托生化婆神永安留守查元帥武安留守邊元帥節度使左監門魏元帥都統軍使右監門趙元帥都監軍使先鋒刀元帥五帥部下精兵猛將左右嶽許二元帥左右行宫侍御從官司祿司勳司士司書列位曹僚司農司稼典絲掌葛列位曹僚司市掌貨考功飭材列位曹僚厨官優官伶官天捷神捷人捷掌卜掌籖掌杯掌鸞傳夢童子神局節級直殿直符香官使者靈濟宫土地合屬威靈恭望洪慈俯垂昭格伏以句龍能土柱能榖乃興社稷之祠周人尚臭商尚聲以通神明之德豈犧牲特為之血食然蘋薠可薦於王公聖而不知是謂之神神而能明乃入於聖恭惟九天金闕明道達德大仙顯靈溥濟清微洞玄沖虛妙感慈惠護國庇民洪恩真君九天玉闕宣化扶教上仙昭靈博濟髙明弘靜沖湛妙應仁惠輔國佑民洪恩真君正直為德禍福動人潛地而地潛天而天莫測威靈之妙曰暘而暘曰雨而雨獨專造化之權赫赫厥聲洋洋如在上佐斗真於北極默參玄學於東華與道合真惟神是守名登金闕榮頒三十二字之封道契丹臺深得五千餘言之旨隨機赴感發誓度人既蒙覆育之恩敢昧謝祈之典恭迎法駕來降道場或服仙珮之蹌蹌八鸞後唱或衣朝衣之濟濟百騎前迎上下之仙眷森羅左右之靈官擁衛酒陳菲禮德鑒芹誠衆等無任勤拳奉迎真馭請兩班請聖鶴駕臨軒請升醮座官衆上香酒陳初獻磬舉散花恭聞仁義著稱枝葉分偃王之裔忠武不屈簮纓襲齊國之封仁聲肇著於閩中德譽逺聞於海內勒名鐘鼎立傳史書出戍於峽江之南吏兵之安堵如故立幟於鼇峰之上盜賊之餘黨勦除頓今福地之安均荷堯天之賜恩敢忘於結草詩可詠於甘棠死廟食生封王可謂至矣德施民勞定國于今稱之昔焉草木效公山之靈今也田疇息洪水之害民船激石果聞黃旗救援之聲鄰火返風永無曲突焦爛之患嘉定之蝗蟲不入境寶慶之旱魃不為災紅蛇見而雨沛九天神龍起而雷轟萬里無迹可見夜何見於天燈無聲可聞日何聞於絲竹事迹千年留石碣王封纍代侈金書致士民千里以來歸宜香火四時而寅奉惟德是輔豈圖黍稷之馨非類不歆特重粢盛之潔建功積善執戒清齋若非上格於天心何以超升於仙秩欽承帝命仰沭玄風特書金闕玉闕之名頒降大仙上仙之號道吾道也德吾德也化神化之教神教之不惟誇一時而榮一身抑亦光乃前而振乃後親睦是教燕喜有堂上瞻聖父聖母之尊嚴下列聖子聖孫之富貴聖舅名登於紫府聖兄廟食於金陵神后夫人專掌注生之籍聖妃仙眷環居內侍之班或分福祿之司或任公卿之職權尊五帥勇冠三軍乃武乃文在左在右廟鎮七閩之地其甚盛蔑以加諸德參五嶽之靈非至聖孰能與此某等席神之庇遺我以安一飲一啄初不敢忘三沐三薰敬之如在祗迎寶馭少鑒鬯人齋事之勤爰集羽流敢獻碧落空歌之瑞臣等百拜恭祝當今皇帝億載萬年為父母保子姓以安全千祿百福宜君王𢌿皇圖而永久某等欽承惟謹敢怠宣行所有誠詞謹當宣奏宣詞按如詞旨巳具敷宣伏冀仙慈俯垂省覽恭聞捍患禦災禮特嚴於祀典報功崇德職宜進於仙階荐膺金闕之緹書榮侍玉皇之香案二氣吐納深究出青入玄之方七液周流有得回紫抱黃之妙在身為獨善之美於人施兼濟之功所感必通無求不應救民疾苦何須扁鵲之方卜地隂陽默授景純之學問婚者宜家宜室祈嗣者生子生孫求仕者勸之以忠孝立身行商者告之以仁義為利農力於穡工精其能近者恱而逺者來顯諸仁而藏諸用皈心嚮道皆蒙啓迪之恩戴髮垂髫俱托帡幪之庇以今臣等欽承聖旨用建醮因答謝真庥祈敷景貺伏願聖德凝純神功丕著九天鍚慶來浩浩之福源二景齊明開巍巍之夀域百昌均被庶績咸熙衆等設拜上香酒陳亞獻知磬舉散花伏聞一片羅池碑終古難磨其英氣千年東華洞至今孰紹於真風洪惟守土之神積此彌天之行骨像合仙於廣惠文章並駕於栁侯若非星宿之儲精必也山川之孕秀有詩歌賦頌之可述須嚴大書特書至於屢書言吉凶禍福以無差未免初瀆再瀆煩于三瀆灼見顯幽之理預明倚伏之機貌重而威畏之如嚴霜烈日道髙且逺仰之如北斗泰山盛德昭昭皇靈剡剡以今臣等欽承聖旨崇建寶齋昭答靈庥祈敷景貺伏願皇圖鞏固並山嶽以同堅聖體𥙿安等乾坤而齊永六宮恆吉萬國咸寧衆等設拜上香酒陳終獻宣狀送聖伏聞鼇峰聳傑可攀天上之星辰龍首軒昻沛作人間之雨露良以感恩於平日將何酬報於今時清供載陳愧乏玉饔金醴仙家所茹無非火交梨今則寶篆香殘銀缸熖冷星冠羽服步虛逺徹於瑶宫霧輦雲軿隊仗將旋於金闕徒切馳情於戀戀更祈降福以穰穰衆等虔誠再拜奉送送神復爐香官使者左右神君侍香諸靈官當令設醮之所自然生金液丹碧芝英百靈衆真慶會在此香火爐前當願宸衷孚達真鑒無遺十方仙童玉女接侍香煙傳臣向來所啓之言速達徑御九天金闕明道達德大仙顯靈漙濟清微洞玄沖虛妙感慈惠護國庇民洪恩真君九天玉闕宣化扶教上仙昭靈博濟髙明弘靜沖湛妙應仁惠輔國佑民洪恩真君聖前洪恩靈濟真君祈謝設醮科
